{% set version = "1.1-4" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-flashclust
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/flashClust_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/flashClust/flashClust_{{ version }}.tar.gz
  sha256: 4ea74236921a05457bedeb7415323d4ca5479dcfa56f8ba5489de604c33db4e9

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/

requirements:
  build:
    - {{ compiler('c') }}        # [not win]
    - {{ stdlib("c") }}          # [not win]
    - {{ compiler('fortran') }}  # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ stdlib("m2w64_c") }}          # [win]
    - {{ compiler('m2w64_fortran') }}        # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
  run:
    - r-base

test:
  commands:
    - $R -e "library('flashClust')"           # [not win]
    - "\"%R%\" -e \"library('flashClust')\""  # [win]

about:
  home: https://CRAN.R-project.org/package=flashClust
  license: GPL-2.0-or-later
  summary: Fast implementation of hierarchical clustering
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3'

extra:
  recipe-maintainers:
    - conda-forge/r
